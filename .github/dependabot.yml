version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  cooldown:
    default-days: 14
    semver-major-days: 30
    semver-minor-days: 14
    semver-patch-days: 14
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  cooldown:
    default-days: 14
    semver-major-days: 30
    semver-minor-days: 14
    semver-patch-days: 14
